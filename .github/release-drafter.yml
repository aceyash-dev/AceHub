name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement

  - title: '🐛 Bug Fixes'
    labels:
      - bug
      - fix

  - title: '⚡ Performance'
    labels:
      - performance

  - title: '📚 Documentation'
    labels:
      - documentation
      - docs

  - title: '🧹 Maintenance'
    labels:
      - chore
      - dependencies

change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'

template: |
  ## 🚀 What's Changed

  $CHANGES

  ## ❤️ Contributors

  $CONTRIBUTORS

  **Full Changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION